<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>問い合わせ一覧</title>
</head>

<body>
    <h1>問い合わせ一覧</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>優先度</th>
                <th>ステータス</th>
                <th>登録日</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}">ID</td>
                <td th:text="${ticket.title}">タイトル</td>
                <td th:text="${ticket.priority}">優先度</td>
                <td th:text="${ticket.status}">ステータス</td>
                <td th:text="${ticket.registrationDate}">登録日時</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
